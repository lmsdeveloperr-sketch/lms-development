<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to collect data</title>
    <link rel="stylesheet" href="style/formstyle.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li> <a href="">Home</a></li>
                <li> <a href="">About</a></li>
                <li> <a href="">Courses</a></li>
                <li> <a href="">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form>
            <label for="name">Your name</label>
            <input required type="text" name="" id="name">

            <label for="email">Your email</label>
            <input required type="email" name="" id="email">
            <br>
            <br>
            <fieldset>
                <legend>Types of flapjack</legend>
                <input required type="radio" name="pita" id="citoy">
                <label for="citoy">Citoy</label>

                <input type="radio" name="pita" id="pakan">
                <label for="pakan">Pakan pita</label>

                <input type="radio" name="pita" id="kuli">
                <label for="kuli">Kuli pitha</label>
            </fieldset>
            <br>
            <fieldset>
                <legend>Types of Rice</legend>
                <input type="checkbox" name="" id="mini">
                <label for="mini">Miniket</label>

                <input type="checkbox" name="" id="super">
                <label for="super">Super Miniket</label>

                <input type="checkbox" name="" id="rod">
                <label for="rod">Rod Miniket</label>
            </fieldset>
            <br>
            <input type="submit" value="Submit Now">
            <input type="reset" value="Clear">
        
        </form>
    </main>
    <footer>
        <p><small>&copy; 2026</small></p>
    </footer>
</body>
</html>
